<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>広島県信号機台帳 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #58a6ff;
    --green: #3fb950;
    --orange: #f0883e;
    --text: #e6edf3;
    --text2: #8b949e;
    --font: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #58a6ff, #3fb950);
    border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  h1 { font-size: 15px; font-weight: 700; line-height: 1.2; }
  h1 span { display: block; font-size: 11px; color: var(--text2); font-weight: 400; margin-top: 2px; }

  .search-area { display: flex; gap: 8px; align-items: stretch; }
  .input-wrap { flex: 1; position: relative; }
  .input-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px; padding: 10px 14px;
    outline: none; font-family: var(--font); transition: border-color 0.2s; -webkit-appearance: none;
  }
  .input-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
  .input-wrap input::placeholder { color: var(--text2); }

  .count-badge {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; font-size: 12px; color: var(--text2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex-shrink: 0; min-width: 60px;
  }
  .count-badge strong { font-size: 18px; color: var(--accent); font-weight: 700; display: block; line-height: 1; }

  .suggest-box {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    max-height: 220px; overflow-y: auto; z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none;
  }
  .suggest-box.open { display: block; }
  .suggest-item {
    padding: 10px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover, .suggest-item.active { background: var(--surface2); }
  .suggest-num { font-size: 13px; color: var(--accent); font-weight: 700; min-width: 52px; }
  .suggest-name { font-size: 13px; color: var(--text); }
  .suggest-sub { font-size: 11px; color: var(--text2); margin-left: auto; flex-shrink: 0; }

  main { padding: 16px 16px 80px; max-width: 600px; margin: 0 auto; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state h2 { font-size: 16px; color: var(--text2); font-weight: 500; margin-bottom: 8px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; animation: slideUp 0.3s ease; display: none;
  }
  .result-card.show { display: block; }
  @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

  .card-header {
    background: linear-gradient(135deg, rgba(88,166,255,0.15), rgba(63,185,80,0.1));
    border-bottom: 1px solid var(--border);
    padding: 16px 18px; display: flex; align-items: flex-start; gap: 12px;
  }
  .card-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--green));
    border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 22px; flex-shrink: 0;
  }
  .card-title-area { flex: 1; min-width: 0; }
  .card-number { font-size: 12px; color: var(--accent); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 3px; }
  .card-name { font-size: 22px; font-weight: 800; color: var(--text); word-break: break-all; }
  .card-police { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* 階梯図ボタン */
  .kaiteizu-bar {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(240,136,62,0.06);
  }
  .kaiteizu-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%;
    background: rgba(240,136,62,0.15);
    border: 1px solid rgba(240,136,62,0.4);
    border-radius: 10px; color: var(--orange);
    text-decoration: none; font-size: 15px; font-weight: 700;
    padding: 12px; transition: background 0.2s;
  }
  .kaiteizu-btn:hover { background: rgba(240,136,62,0.28); }

  .data-grid { padding: 4px 0; }
  .data-row {
    display: flex; align-items: flex-start;
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    gap: 12px; transition: background 0.1s;
  }
  .data-row:last-child { border-bottom: none; }
  .data-row:hover { background: rgba(255,255,255,0.02); }
  .data-label { font-size: 11px; color: var(--text2); min-width: 90px; flex-shrink: 0; padding-top: 2px; font-weight: 500; }
  .data-value { font-size: 14px; color: var(--text); line-height: 1.5; word-break: break-all; flex: 1; }
  .data-value.empty { color: var(--text2); font-style: italic; font-size: 13px; }

  .map-buttons { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .map-btn {
    display: inline-flex; align-items: center; gap: 5px;
    text-decoration: none; font-size: 13px; font-weight: 600;
    padding: 7px 14px; border-radius: 20px; border: 1px solid;
    transition: background 0.2s; white-space: nowrap;
  }
  .map-btn.gmaps { color: #58a6ff; background: rgba(88,166,255,0.1); border-color: rgba(88,166,255,0.35); }
  .map-btn.gmaps:hover { background: rgba(88,166,255,0.22); }
  .map-btn.street { color: #3fb950; background: rgba(63,185,80,0.1); border-color: rgba(63,185,80,0.35); }
  .map-btn.street:hover { background: rgba(63,185,80,0.22); }

  .footer-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 10px 16px; text-align: center; font-size: 11px; color: var(--text2);
  }
  .footer-bar span { color: var(--accent); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">🚦</div>
    <h1>広島県 信号機台帳
      <span>Signal Control Register 2026</span>
    </h1>
  </div>
  <div class="search-area">
    <div class="input-wrap">
      <input type="text" id="searchInput"
             placeholder="規制番号 または 交差点名称を入力…"
             inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="suggest-box" id="suggestBox"></div>
    </div>
    <div class="count-badge">
      <strong>4055</strong>
      <span>件</span>
    </div>
  </div>
</header>

<main>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🔍</div>
    <h2>交差点を検索</h2>
    <p>規制番号（例：10001）または<br>交差点名称の一部を入力してください</p>
  </div>
  <div class="result-card" id="resultCard">
    <div class="card-header">
      <div class="card-icon">🚦</div>
      <div class="card-title-area">
        <div class="card-number" id="rNum"></div>
        <div class="card-name" id="rName"></div>
        <div class="card-police" id="rPolice"></div>
      </div>
    </div>
    <div class="kaiteizu-bar">
      <a class="kaiteizu-btn" id="kaiteizuBtn" href="#" target="_blank">
        📊 階梯図を開く
      </a>
    </div>
    <div class="data-grid" id="dataGrid"></div>
  </div>
</main>

<footer class="footer-bar">
  広島県警察 交通信号機台帳 &nbsp;|&nbsp; <span>2026年版</span> &nbsp;|&nbsp; 全 <span>4055</span> 交差点
</footer>

<script>
let DATA = [];
fetch('data.csv')
  .then(r => r.text())
  .then(text => {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
    DATA = lines.slice(1).map(line => {
      const values = line.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
      const obj = {};
      headers.forEach((h, i) => {
        obj[h] = (values[i] || '').replace(/"/g, '').trim();
      });
      return obj;
    });
  });
const GITHUB_BASE = 'https://fukuyama29804486.github.io/kaiteizu/';

const DISPLAY_FIELDS = [
  { key: '制御種別',    icon: '⚙️' },
  { key: '制御機形式',  icon: '📦' },
  { key: '警交仕規',    icon: '📋' },
  { key: 'メーカー補足', icon: '🔧' },
  { key: '製造会社名',  icon: '🏭' },
  { key: '製造番号',    icon: '🔢' },
  { key: '製造年月',    icon: '📅' },
  { key: '道路別',      icon: '🛣️' },
  { key: '設置場所',    icon: '📍' },
  { key: '座標',        icon: '🗺️' },
];

const searchInput = document.getElementById('searchInput');
const suggestBox  = document.getElementById('suggestBox');
const resultCard  = document.getElementById('resultCard');
const emptyState  = document.getElementById('emptyState');
const dataGrid    = document.getElementById('dataGrid');
const kaiteizuBtn = document.getElementById('kaiteizuBtn');

let suggestItems = [];
let activeIdx = -1;

function getSuggestions(q) {
  if (!q) return [];
  const isNum = /^\d+$/.test(q);
  const results = [];
  for (const row of DATA) {
    if (isNum) {
      if (row['規制番号'].startsWith(q)) results.push(row);
    } else {
      if (row['交差点名称'].includes(q) || row['警察署名'].includes(q)) results.push(row);
    }
    if (results.length >= 30) break;
  }
  return results;
}

function renderSuggest(items) {
  suggestItems = items;
  activeIdx = -1;
  if (!items.length) { suggestBox.classList.remove('open'); return; }
  suggestBox.innerHTML = items.map((r, i) => `
    <div class="suggest-item" data-idx="${i}">
      <span class="suggest-num">${r['規制番号']}</span>
      <span class="suggest-name">${r['交差点名称']}</span>
      <span class="suggest-sub">${r['警察署名']}</span>
    </div>
  `).join('');
  suggestBox.classList.add('open');
  suggestBox.querySelectorAll('.suggest-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      showRecord(suggestItems[+el.dataset.idx]);
      suggestBox.classList.remove('open');
      searchInput.blur();
    });
  });
}

function showRecord(row) {
  const num = row['規制番号'];
  searchInput.value = num + '　' + row['交差点名称'];
  document.getElementById('rNum').textContent = '規制番号 ' + num;
  document.getElementById('rName').textContent = row['交差点名称'];
  document.getElementById('rPolice').textContent = '📍 ' + row['警察署名'] + '警察署';

  // 階梯図ボタンのURLを規制番号から自動生成
  kaiteizuBtn.href = GITHUB_BASE + num + '.pdf';

  let html = '';
  for (const f of DISPLAY_FIELDS) {
    const v = row[f.key] || '';
    if (f.key === '座標' && v) {
      const enc = encodeURIComponent(v);
      const gmapsUrl  = `https://www.google.com/maps/search/?api=1&query=${enc}`;
      const streetUrl = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${enc}`;
      html += `<div class="data-row">
        <span class="data-label">${f.icon} ${f.key}</span>
        <div class="data-value">
          <div style="font-size:12px;color:var(--text2);margin-bottom:6px">${v}</div>
          <div class="map-buttons">
            <a class="map-btn gmaps" href="${gmapsUrl}" target="_blank">🗺️ Google Maps</a>
            <a class="map-btn street" href="${streetUrl}" target="_blank">🚶 Street View</a>
          </div>
        </div>
      </div>`;
    } else {
      html += `<div class="data-row">
        <span class="data-label">${f.icon} ${f.key}</span>
        <span class="data-value${v ? '' : ' empty'}">${v || '（未登録）'}</span>
      </div>`;
    }
  }

  dataGrid.innerHTML = html;
  resultCard.classList.add('show');
  emptyState.style.display = 'none';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

searchInput.addEventListener('input', () => {
  renderSuggest(getSuggestions(searchInput.value.trim()));
});

searchInput.addEventListener('keydown', e => {
  const items = suggestBox.querySelectorAll('.suggest-item');
  if (e.key === 'ArrowDown') {
    activeIdx = Math.min(activeIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    e.preventDefault();
  } else if (e.key === 'ArrowUp') {
    activeIdx = Math.max(activeIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
    e.preventDefault();
  } else if (e.key === 'Enter') {
    if (activeIdx >= 0 && suggestItems[activeIdx]) {
      showRecord(suggestItems[activeIdx]);
      suggestBox.classList.remove('open');
    } else if (suggestItems.length === 1) {
      showRecord(suggestItems[0]);
      suggestBox.classList.remove('open');
    }
  } else if (e.key === 'Escape') {
    suggestBox.classList.remove('open');
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.input-wrap')) suggestBox.classList.remove('open');
});
</script>
</body>
</html>
